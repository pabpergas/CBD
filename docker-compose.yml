services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  python-worker:
    build: ./worker
    tmpfs:
      - /tmp/output

  server:
    build: ./server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PYTHON_WORKER_URL=http://python-worker:8000
    depends_on:
      - qdrant
      - python-worker
    volumes:
      - ./server/src:/app/src
      - server_artifacts:/app/artifacts

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src

volumes:
  qdrant_data:
  server_artifacts:
